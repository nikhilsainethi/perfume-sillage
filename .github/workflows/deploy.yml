# ============================================================
# SILLAGE — build & deploy to GitHub Pages
# Quality gates run first: catalog validation, domain tests,
# type-checked production build. Hash routing means the app
# works untouched under the /perfume-sillage/ subpath.
# (No-op until Pages is enabled: Settings → Pages → GitHub Actions)
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate catalog integrity
        run: node scripts/validate-catalog.mjs
      - name: Domain tests
        run: npm test
      - name: Build (type-checked)
        run: npx tsc -b && npx vite build --base=/perfume-sillage/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
